# ============================================================================
# Nelna Maintenance System - Render.com Blueprint (Infrastructure-as-Code)
# Deploy: Connect your GitHub repo → Render auto-detects this file
# ============================================================================

services:
  - type: web
    name: nelna-maintenance-api
    runtime: node
    region: singapore  # closest to Sri Lanka
    plan: free
    rootDir: backend
    buildCommand: npm ci && npx prisma generate
    startCommand: node src/server.js
    envVars:
      # ⚠️ CRITICAL: Must set DATABASE_URL manually in Render dashboard
      # Use Supabase SESSION MODE pooler (port 5432) URL
      # Format: postgresql://postgres.[project-ref]:password@aws-0-[region].pooler.supabase.com:5432/postgres
      - key: DATABASE_URL
        sync: false  # Must set manually - Render won't auto-generate
      
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 24h
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: CORS_ORIGIN
        value: https://nelna-maintenance.netlify.app
      - key: PORT
        value: 3000
      - key: LOG_LEVEL
        value: info
    healthCheckPath: /api/v1/health
    autoDeploy: true

  - type: web
    name: nelna-maintenance-python-api
    runtime: python
    region: singapore
    plan: free
    rootDir: backend-python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -k uvicorn.workers.UvicornWorker -c gunicorn.conf.py
    envVars:
      # ⚠️ Must match the value set on nelna-maintenance-api above
      - key: JWT_SECRET
        sync: false

      # ⚠️ Set to the same Supabase/PostgreSQL URL as the Node service
      # Use asyncpg driver prefix: postgresql+asyncpg://...
      - key: DATABASE_URL
        sync: false

      - key: REDIS_URL
        # Provision a Render Redis instance and paste the internal URL here
        sync: false

      # Internal Render URL of the Node service (for compat proxy)
      - key: LEGACY_API_URL
        fromService:
          name: nelna-maintenance-api
          type: web
          property: host

      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: GUNICORN_WORKERS
        value: 2
      - key: RATE_LIMIT_COLLECT
        value: 200/minute
      - key: MAX_BATCH_SIZE
        value: 1000
      - key: REDIS_STREAM_KEY
        value: nelna:collect:events
    healthCheckPath: /api/v1/health
    autoDeploy: true
