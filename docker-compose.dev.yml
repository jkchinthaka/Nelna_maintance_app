version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nelna_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nelna_user
      POSTGRES_PASSWORD: NelnaPass2024
      POSTGRES_DB: nelna_maintenance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nelna_user -d nelna_maintenance"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
