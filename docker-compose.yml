# ===========================================================
# Nelna Integrated Maintenance Management System
# Docker Compose - Full Stack Production Environment
# Database: PostgreSQL 15 (unified across Node + Python)
# ===========================================================

version: '3.8'

services:
  # ==================== PostgreSQL Database ====================
  postgres:
    image: postgres:15-alpine
    container_name: nelna_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nelna_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-NelnaPass@2024}
      POSTGRES_DB: ${POSTGRES_DB:-nelna_maintenance}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nelna_user} -d ${POSTGRES_DB:-nelna_maintenance}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - nelna_network
    command: >
      postgres
        -c max_connections=300
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=4MB

  # ==================== Redis Cache ====================
  redis:
    image: redis:7-alpine
    container_name: nelna_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nelna_network
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru

  # ==================== Node.js Backend API (Legacy + Proxy) ====================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nelna_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-nelna_user}:${POSTGRES_PASSWORD:-NelnaPass@2024}@postgres:5432/${POSTGRES_DB:-nelna_maintenance}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set in .env}
      JWT_EXPIRE: ${JWT_EXPIRE:-24h}
      JWT_REFRESH_EXPIRE: ${JWT_REFRESH_EXPIRE:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - api_uploads:/app/uploads
      - api_logs:/app/logs
    networks:
      - nelna_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==================== Python High-Performance API ====================
  python-api:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    container_name: nelna_python_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nelna_user}:${POSTGRES_PASSWORD:-NelnaPass@2024}@postgres:5432/${POSTGRES_DB:-nelna_maintenance}
      REDIS_URL: redis://redis:6379/0
      LEGACY_API_URL: http://api:3000
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      MAX_BATCH_SIZE: ${MAX_BATCH_SIZE:-1000}
      REDIS_STREAM_KEY: ${REDIS_STREAM_KEY:-nelna:collect:events}
      PROXY_TIMEOUT_SECONDS: ${PROXY_TIMEOUT_SECONDS:-30}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      RATE_LIMIT_COLLECT: ${RATE_LIMIT_COLLECT:-200/minute}
    ports:
      - "${PY_API_PORT:-8000}:8000"
    networks:
      - nelna_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 35s

  # ==================== Database Migration Runner ====================
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nelna_migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nelna_user}:${POSTGRES_PASSWORD:-NelnaPass@2024}@postgres:5432/${POSTGRES_DB:-nelna_maintenance}
    command: >
      sh -c "npx prisma migrate deploy && npx prisma db seed"
    networks:
      - nelna_network
    restart: "no"

  # ==================== Nginx Reverse Proxy ====================
  nginx:
    image: nginx:alpine
    container_name: nelna_nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      python-api:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-8080}:80"
      - "${NGINX_SSL_PORT:-8443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - nelna_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ==================== pgAdmin (Development Only) ====================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nelna_pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@nelna.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-NelnaAdmin@2024}
    ports:
      - "${PGADMIN_PORT:-8081}:80"
    networks:
      - nelna_network
    profiles:
      - dev

# ==================== Volumes ====================
volumes:
  postgres_data:
    driver: local
    name: nelna_postgres_data
  redis_data:
    driver: local
    name: nelna_redis_data
  api_uploads:
    driver: local
    name: nelna_api_uploads
  api_logs:
    driver: local
    name: nelna_api_logs
  nginx_logs:
    driver: local
    name: nelna_nginx_logs

# ==================== Networks ====================
networks:
  nelna_network:
    driver: bridge
    name: nelna_network
